server:
  port: 8080

spring:
  application:
    name: linguafy-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/linguafy
    username: linguafy
    password: linguafy

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
    locations: classpath:db/migration

jwt:
  secret: linguafy-secret-key-12345678901234
  expiration: 86400000

deepl:
  base-url: ${DEEPL_BASE_URL:https://api-free.deepl.com}
  api-key: ${DEEPL_API_KEY:}
  default-target-lang: ${DEEPL_TARGET_LANG:PT-BR}
